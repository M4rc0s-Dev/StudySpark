# OpenRouter models configuration.
# Copy this file to config.yaml and fill in your own API keys.
# config.yaml is gitignored and must NEVER be committed.
model_list:
  - model_name: google-gemma
    litellm_params:
      model: openrouter/google/gemma-4-31b-it:free
      api_key: sk-or-v1-REPLACE_WITH_YOUR_KEY
  - model_name: tencent-hy3
    litellm_params:
      model: openrouter/tencent/hy3:free
      api_key: sk-or-v1-REPLACE_WITH_YOUR_KEY
  - model_name: auto-router
    litellm_params:
      model: openrouter/free
      api_key: sk-or-v1-REPLACE_WITH_YOUR_KEY
