<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySpark — AI Flashcard Generator</title>
    <script>
      // Apply the saved theme (or the device preference) before React mounts,
      // so there is no light/dark flash on first paint.
      (function () {
        try {
          var saved = localStorage.getItem('studyspark.theme')
          var theme = saved === 'light' || saved === 'dark'
            ? saved
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          if (theme === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
